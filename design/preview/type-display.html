<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #063C6B; font-family: 'DM Sans', sans-serif; padding: 24px 24px 16px; }
  .label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(207,211,210,0.4); margin-bottom: 18px; font-weight: 500; }
  .spec { font-size: 10px; color: rgba(207,211,210,0.4); font-family: 'DM Sans', sans-serif; font-weight: 400; }
  .row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 14px; }
  .row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
</style>
</head>
<body>
  <div class="label">Display — Space Grotesk</div>

  <div class="row">
    <div style="font-family:'Space Grotesk',sans-serif; font-size:48px; font-weight:700; color:#F2F1F0; letter-spacing:-0.03em; line-height:1.05">Build with intent.</div>
    <div class="spec">48px · Bold</div>
  </div>
  <div class="row">
    <div style="font-family:'Space Grotesk',sans-serif; font-size:32px; font-weight:600; color:#F2F1F0; letter-spacing:-0.025em; line-height:1.1">Clarity is the first strategy.</div>
    <div class="spec">32px · Semibold</div>
  </div>
  <div class="row">
    <div style="font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:500; color:#F2F1F0; line-height:1.3">The discipline of the long view.</div>
    <div class="spec">24px · Medium</div>
  </div>
  <div class="row">
    <div style="font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:400; color:#CFD3D2; line-height:1.3">Products built slowly are the ones that last.</div>
    <div class="spec">18px · Regular</div>
  </div>
</body>
</html>
