<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #063C6B; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 16px; min-width: 700px; }

  /* ── NAV ── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 60px;
    background: rgba(17,77,138,0.7);
    border: 1px solid rgba(207,211,210,0.12);
    border-radius: 10px;
    backdrop-filter: blur(16px);
    position: relative; overflow: hidden;
  }
  /* subtle top highlight */
  .nav::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(242,241,240,0.12) 40%, transparent);
  }
  /* warm glow on right */
  .nav::after {
    content: ''; position: absolute; right: -40px; top: -20px;
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,122,32,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .nav-brand {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px; font-weight: 700;
    color: #F2F1F0; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
    white-space: nowrap;
  }
  .nav-brand-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #F07A20;
  }
  .nav-links { display: flex; gap: 4px; align-items: center; }
  .nav-link {
    font-size: 13px; color: rgba(207,211,210,0.6);
    padding: 6px 14px; border-radius: 6px;
    cursor: pointer; transition: all 180ms;
    position: relative;
  }
  .nav-link.active {
    color: #F2F1F0;
    background: rgba(255,255,255,0.07);
  }
  .nav-link.active::after {
    content: ''; position: absolute;
    bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 16px; height: 2px;
    background: #F07A20; border-radius: 1px;
  }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-icon {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid rgba(207,211,210,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .nav-icon svg { opacity: 0.5; }
  .nav-cta {
    background: #1675A6; color: #F2F1F0;
    padding: 8px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    border: none; cursor: pointer; font-family: inherit;
    box-shadow: 0 2px 12px rgba(22,117,166,0.4);
    display: flex; align-items: center; gap: 6px;
  }
  .nav-cta-arrow { opacity: 0.7; font-size: 14px; }

  /* ── FOOTER ── */
  .footer {
    border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(207,211,210,0.1);
  }
  .footer-top {
    background: #041F3A;
    padding: 22px 28px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(207,211,210,0.08);
    position: relative; overflow: hidden;
  }
  .footer-top::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, #F07A20, rgba(240,122,32,0));
  }
  .footer-wave {
    position: absolute; right: 0; bottom: 0; top: 0;
    opacity: 0.06;
  }
  .footer-brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 700;
    color: rgba(242,241,240,0.85); letter-spacing: -0.01em;
  }
  .footer-brand-tag {
    font-size: 10px; color: rgba(207,211,210,0.3);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-top: 3px; white-space: nowrap;
  }
  .footer-links-row { display: flex; gap: 20px; align-items: center; }
  .footer-link {
    font-size: 12px; color: rgba(207,211,210,0.45);
    cursor: pointer; display: flex; align-items: center; gap: 5px;
  }
  .footer-link-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(240,122,32,0.5); }
  .footer-bottom {
    background: #031729;
    padding: 12px 28px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-copy { font-size: 11px; color: rgba(207,211,210,0.25); }
  .footer-rule { width: 20px; height: 1px; background: rgba(240,122,32,0.4); }
  .footer-legal { font-size: 10px; color: rgba(207,211,210,0.2); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>

  <!-- NAV -->
  <div class="nav">
    <div class="nav-brand">
      <div class="nav-brand-dot"></div>
      Jose Salcido
    </div>
    <div class="nav-links">
      <div class="nav-link active">About</div>
      <div class="nav-link">Work</div>
      <div class="nav-link">Writing</div>
      <div class="nav-link">Contact</div>
    </div>
    <div class="nav-right">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="#F2F1F0" stroke-width="1.3"/>
          <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#F2F1F0" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <button class="nav-cta">Get in touch <span class="nav-cta-arrow">→</span></button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-top">
      <!-- wave bg -->
      <svg class="footer-wave" viewBox="0 0 300 80" fill="none" height="80" width="300">
        <path d="M0 50 Q40 30 80 40 Q120 50 160 30 Q200 10 240 20 Q270 28 300 15 L300 80 L0 80 Z" fill="#6FA3C2"/>
        <path d="M0 60 Q50 45 100 55 Q150 65 200 48 Q240 34 300 42 L300 80 L0 80 Z" fill="#1675A6" opacity="0.8"/>
      </svg>
      <div style="position:relative;z-index:1">
        <div class="footer-brand-name">Jose Salcido</div>
        <div class="footer-brand-tag">Entrepreneur · Builder · Stoic</div>
      </div>
      <div class="footer-links-row" style="position:relative;z-index:1">
        <div class="footer-link"><div class="footer-link-dot"></div>LinkedIn</div>
        <div class="footer-link"><div class="footer-link-dot"></div>Twitter / X</div>
        <div class="footer-link"><div class="footer-link-dot"></div>Email</div>
      </div>
    </div>
    <div class="footer-bottom">
      <div class="footer-copy">© 2026 Jose Salcido. All rights reserved.</div>
      <div class="footer-rule"></div>
      <div class="footer-legal">Privacy · Terms</div>
    </div>
  </div>

</body>
</html>
